<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <div class="brand">
            <span class="logo">◈</span>
            <div>
                <h1>JARVIS</h1>
                <span class="subtitle">Secure Hybrid · Tier 1 Orchestrator</span>
            </div>
        </div>
        <div class="status">
            <span class="dot" id="dot-llm" title="LLM"></span> LLM
            <span class="dot" id="dot-stt" title="STT"></span> STT
            <span class="dot" id="dot-tts" title="TTS"></span> TTS
            <button id="btn-knowledge" title="Dokument zur Wissensbasis hinzufügen">📚</button>
            <input type="file" id="file-knowledge" accept=".txt,.md,.pdf" style="display:none">
            <button id="btn-vision" title="Bild analysieren (Frage ins Eingabefeld, dann Bild wählen)">📷</button>
            <input type="file" id="file-vision" accept="image/*" style="display:none">
            <button id="btn-profile" title="Profil &amp; Stimme">👤</button>
            <a href="/downloads" class="admin-link" title="Downloads">📦</a>
            <a href="/admin" class="admin-link" title="Administration">🛡</a>
        </div>
    </header>

    <main>
        <canvas id="hud" class="hud"></canvas>
        <div id="chat" class="chat"></div>

        <div class="composer">
            <button id="btn-mic" class="mic" title="Sprechen (Aufnahme starten/stoppen)">🎤</button>
            <input id="input" type="text" placeholder="Nachricht an Jarvis…" autocomplete="off">
            <label class="tts-toggle"><input type="checkbox" id="tts-on" checked> 🔊</label>
            <button id="btn-send">Senden</button>
        </div>
        <div id="hint" class="hint"></div>
    </main>

    <!-- Profil & Stimme (Selbstbedienung) -->
    <div id="profile" class="modal hidden">
        <div class="modal-box">
            <h2>Profil &amp; Stimme</h2>
            <p>Zuletzt erkannt: <b id="prof-current">niemand</b></p>
            <button id="btn-rec-voice">🎙 Stimmprofil aufnehmen (5 s)</button>
            <span id="prof-rec-status" class="hint"></span>
            <hr style="border-color:#243446;margin:16px 0">
            <h2>Neuen Nutzer anlegen</h2>
            <p class="muted" style="font-size:12px">Passwortlos — die Person vergibt ihr Passwort beim ersten Login.
               Erst-Stimmprofil über den Admin-Bereich oder direkt nach erster Erkennung.</p>
            <label>Name <input id="prof-newuser" placeholder="z. B. Johanna"></label>
            <button id="btn-create-user">Anlegen</button>
            <span id="prof-create-status" class="hint"></span>
            <div class="modal-actions">
                <button id="btn-prof-close" class="secondary">Schließen</button>
            </div>
        </div>
    </div>

    <audio id="player"></audio>
    <script src="/static/hud.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
