<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a0e14">
<title>JARVIS · To-do</title>
<style>
:root{--bg:#0a0e14;--panel:#111824;--panel2:#16202e;--accent:#2dd4ff;--accent-dim:#1a7f99;
--text:#d7e3ee;--muted:#6b7d90;--ok:#3ad29f;--bad:#ff5c6c;--warn:#ffb454;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;min-height:100vh;font-family:"Segoe UI",system-ui,sans-serif;color:var(--text);
background:radial-gradient(1200px 600px at 70% -10%,#13202e,var(--bg));}
header{display:flex;align-items:center;gap:10px;padding:16px;border-bottom:1px solid #1e2b3a;
position:sticky;top:0;background:rgba(10,14,20,.85);backdrop-filter:blur(6px);}
.logo{font-size:24px;color:var(--accent);text-shadow:0 0 14px var(--accent-dim);}
header h1{font-size:16px;letter-spacing:2px;margin:0;}
header .sub{font-size:11px;color:var(--muted);}
main{max-width:560px;margin:0 auto;padding:14px;}
.add{display:flex;gap:8px;margin-bottom:14px;}
.add input{flex:1;background:var(--panel);border:1px solid #243446;color:var(--text);
padding:14px;border-radius:12px;font-size:16px;outline:none;}
.add input:focus{border-color:var(--accent-dim);}
.add button{background:var(--accent);color:#04141b;border:none;border-radius:12px;
font-size:22px;font-weight:700;padding:0 18px;cursor:pointer;}
.item{display:flex;align-items:center;gap:14px;background:var(--panel2);border:1px solid #1e2b3a;
border-radius:14px;padding:14px;margin-bottom:10px;}
.box{width:30px;height:30px;flex:none;border-radius:9px;border:2px solid var(--accent-dim);
display:flex;align-items:center;justify-content:center;color:#04141b;font-weight:700;font-size:18px;cursor:pointer;}
.item.done .box{background:var(--ok);border-color:var(--ok);}
.txt{flex:1;font-size:16px;line-height:1.3;}
.item.done .txt{color:var(--muted);text-decoration:line-through;}
.badge{font-size:12px;color:var(--warn);white-space:nowrap;}
.sec{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin:18px 4px 8px;}
.empty,.err{color:var(--muted);text-align:center;padding:40px 10px;}
.err{color:var(--bad);}
footer{text-align:center;color:var(--muted);font-size:11px;padding:20px;}
</style>
</head>
<body>
<header>
    <span class="logo">◈</span>
    <div><h1>JARVIS</h1><div class="sub" id="who">To-do</div></div>
</header>
<main>
    <div class="add">
        <input id="new" placeholder="Neuer Punkt…" enterkeyhint="done" autocomplete="off">
        <button id="add" aria-label="Hinzufügen">+</button>
    </div>
    <div id="list"></div>
</main>
<footer>JARVIS · nur im lokalen Netzwerk</footer>
<script>
const token = location.pathname.split("/").filter(Boolean).pop();
const $ = (id) => document.getElementById(id);
const esc = (s) => (s||"").replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
let items = [];

async function load(){
    try{
        const r = await fetch(`/api/todo/${token}`);
        if(!r.ok) throw new Error((await r.json().catch(()=>({}))).detail || r.statusText);
        const d = await r.json();
        $("who").textContent = d.username ? "To-do · " + d.username : "To-do";
        items = d.items || []; render();
    }catch(e){ $("list").innerHTML = `<div class="err">${esc(e.message)}</div>`; }
}
function row(t){ return `<div class="item ${t.done?"done":""}">
    <div class="box" data-tg="${t.id}">${t.done?"✓":""}</div>
    <span class="txt">${esc(t.text)}</span>
    ${t.due_date?`<span class="badge">📅 ${t.due_date}</span>`:""}</div>`; }
function render(){
    const open = items.filter(t=>!t.done), done = items.filter(t=>t.done);
    let html = "";
    if(!items.length) html = '<div class="empty">Liste ist leer.</div>';
    else { html = open.map(row).join("");
        if(done.length) html += `<div class="sec">Erledigt</div>` + done.map(row).join(""); }
    $("list").innerHTML = html;
    document.querySelectorAll("[data-tg]").forEach(b=>b.onclick=async()=>{
        const t = items.find(x=>x.id===+b.dataset.tg);
        b.textContent = t.done?"":"✓";                       // sofortiges Feedback
        try{ await fetch(`/api/todo/${token}/toggle`,{method:"POST",headers:{"Content-Type":"application/json"},
            body:JSON.stringify({id:t.id,done:!t.done})}); }catch(e){}
        load();
    });
}
async function add(){
    const v = $("new").value.trim(); if(!v) return;
    $("new").value = "";
    try{ await fetch(`/api/todo/${token}/add`,{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({text:v})}); }catch(e){}
    load();
}
$("add").onclick = add;
$("new").addEventListener("keydown", e=>{ if(e.key==="Enter") add(); });
load();
</script>
</body>
</html>
